{% extends 'layout.html' %}

{% block title %}Admin Login | LernCoding{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card max-w-md mx-auto">
        <div class="mb-8 text-center">
            <p class="auth-eyebrow">Admin</p>
            <h1 class="text-3xl font-extrabold text-slate-900 mt-2">Admin Login</h1>
            <p class="text-slate-600 mt-3">Nur fuer Verwaltung von Accounts und Paketen.</p>
        </div>

        <form method="post" class="space-y-5">
            <div>
                <label for="email" class="auth-label">E-Mail</label>
                <input id="email" name="email" type="email" required class="auth-input" placeholder="admin@beispiel.de">
            </div>
            <div>
                <label for="password" class="auth-label">Passwort</label>
                <input id="password" name="password" type="password" required class="auth-input" placeholder="Admin Passwort">
            </div>
            <button type="submit" class="auth-submit">Als Admin einloggen</button>
        </form>
    </div>
</section>
{% endblock %}
